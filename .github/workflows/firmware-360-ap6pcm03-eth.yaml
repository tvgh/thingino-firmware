---
name: firmware-360-ap6pcm03-eth

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch/tag/SHA) to build
        required: false
        default: master

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: debian:trixie
    env:
      TERM: linux
      BR2_DL_DIR: ~/dl
      FORCE_UNSAFE_CONFIGURE: 1
      BOARD: 360_ap6pcm03_t31x_gc4653_eth+atbm6031
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends --no-install-suggests \
            autoconf build-essential bc cmake cpio curl ca-certificates file git make \
            gawk jq m4 p7zip-full perl procps python3 rsync tzdata u-boot-tools unzip wget

      - name: Setup GitHub workspace in container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout repository source
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.event.inputs.ref || 'master' }}
          fetch-depth: 1

      - name: Validate workflow file has no unresolved merge markers
        run: |
          if grep -nE "^(<<<<<<<|=======|>>>>>>>)" .github/workflows/firmware-360-ap6pcm03-eth.yaml; then
            echo "Unresolved merge conflict markers found in workflow file"
            exit 1
          fi

      - name: Build firmware
        run: |
          mkdir -p ~/.ccache ~/dl
          BOARD="$BOARD" make fast WORKFLOW=1

      - name: Locate firmware output paths
        run: |
          FULL_FW=$(find "${GITHUB_WORKSPACE}/output" -type f -path "*/${BOARD}*/images/thingino-${BOARD}.bin" ! -name "*update.bin" | head -n 1)
          IMG_DIR=$(dirname "$FULL_FW")
          LOG_DIR=$(find "${GITHUB_WORKSPACE}/output" -type d -path "*/${BOARD}*/logs" | head -n 1)
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/artifact-${BOARD}"
          if [ -z "$FULL_FW" ] || [ ! -d "$IMG_DIR" ]; then
            echo "Could not find firmware images directory for ${BOARD}"
            find "${GITHUB_WORKSPACE}/output" -maxdepth 6 -type d | sort
            exit 1
          fi

          mkdir -p "$ARTIFACT_DIR/images"

          if [ -n "$LOG_DIR" ]; then
            mkdir -p "$ARTIFACT_DIR/logs"
            cp -a "$LOG_DIR"/. "$ARTIFACT_DIR/logs/"
          else
            echo "Warning: logs directory not found, uploading images only"
          fi

          echo "IMG_DIR=${IMG_DIR}" >> "$GITHUB_ENV"
          echo "LOG_DIR=${LOG_DIR}" >> "$GITHUB_ENV"
          echo "ARTIFACT_DIR=${ARTIFACT_DIR}" >> "$GITHUB_ENV"
          echo "Using IMG_DIR=$IMG_DIR"
          if [ -n "$LOG_DIR" ]; then echo "Using LOG_DIR=$LOG_DIR"; fi
          echo "Using ARTIFACT_DIR=$ARTIFACT_DIR"

      - name: Validate compiled firmware artifacts
        run: |
          FULL_FW=$(find "${IMG_DIR}" -type f -name "thingino-${BOARD}.bin" ! -name "*update.bin" | head -n 1)
          UPDATE_FW=$(find "${IMG_DIR}" -type f -name "thingino-${BOARD}-update.bin" | head -n 1)
          FULL_FW_SHA=$(find "${IMG_DIR}" -type f -name "thingino-${BOARD}.bin.sha256sum" ! -name "*update.bin*" | head -n 1)
          UPDATE_FW_SHA=$(find "${IMG_DIR}" -type f -name "thingino-${BOARD}-update.bin.sha256sum" | head -n 1)

          if [ -z "$FULL_FW" ] || [ -z "$UPDATE_FW" ]; then
            echo "Required firmware files are missing in ${IMG_DIR}"
            ls -lah "${IMG_DIR}" || true
            exit 1
          fi

          FULL_SIZE=$(stat -c%s "$FULL_FW")
          if [ "$FULL_SIZE" -lt 6000000 ]; then
            echo "Full firmware size is too small: ${FULL_SIZE} bytes (expected near 16MB)"
            ls -lah "${IMG_DIR}" || true
            exit 1
          fi

          echo "FULL_FW=${FULL_FW}" >> "$GITHUB_ENV"
          echo "UPDATE_FW=${UPDATE_FW}" >> "$GITHUB_ENV"
          echo "FULL_FW_SHA=${FULL_FW_SHA}" >> "$GITHUB_ENV"
          echo "UPDATE_FW_SHA=${UPDATE_FW_SHA}" >> "$GITHUB_ENV"

          cp -av "$FULL_FW" "$ARTIFACT_DIR/images/"
          cp -av "$UPDATE_FW" "$ARTIFACT_DIR/images/"
          [ -n "$FULL_FW_SHA" ] && cp -av "$FULL_FW_SHA" "$ARTIFACT_DIR/images/" || true
          [ -n "$UPDATE_FW_SHA" ] && cp -av "$UPDATE_FW_SHA" "$ARTIFACT_DIR/images/" || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thingino-${{ env.BOARD }}-firmware
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
